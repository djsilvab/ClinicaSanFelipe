<div class="product-modal">
  <div class="modal-header-custom">
    <div>
      <h2 class="modal-title"> Registrar Producto </h2>
      <p class="modal-subtitle"> Completa los datos del producto </p>
    </div>
  </div>
  <form [formGroup]="form" class="modal-body-custom">
    <div class="form-group-custom">
      <label class="form-label-custom"> Nombre del producto </label>
      <input class="form-control custom-input" formControlName="name" placeholder="Ej: Laptop Lenovo" />
      <small class="text-danger" *ngIf="form.get('name')?.touched && form.get('name')?.invalid"> El nombre es requerido </small>
    </div>
    <div class="form-group-custom">
      <label class="form-label-custom"> Nro Lote </label>
      <input class="form-control custom-input" formControlName="nroLote" placeholder="Ej: LOT001" />
    </div>
    <div class="row">
      <div class="col-md-6">
        <div class="form-group-custom">
          <label class="form-label-custom"> Costo </label>
          <input type="number" class="form-control custom-input" formControlName="cost" placeholder="0.00" />
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-group-custom">
          <label class="form-label-custom"> Precio Venta </label>
          <input type="number" class="form-control custom-input" formControlName="salePrice" readonly />
          <small class="text-muted"> Se calcula automáticamente (Costo × 1.35) </small>
        </div>
      </div>
    </div>
  </form>
  <div class="modal-footer-custom">
    <button class="btn-cancel" (click)="close()"> Cancelar </button>
    <button class="btn-save" [disabled]="form.invalid" (click)="save()"> Guardar Producto </button>
  </div>
</div>
